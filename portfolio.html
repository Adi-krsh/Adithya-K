<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortFolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Syne:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrapper">
        <div class="card">

            <div class="avatar-wrap">
                <div class="avatar-ring"></div>
                <div class="avatar-bg"></div>
                <img src="./Untitled.jpeg" alt="Portfolio Image">
                <div class="status-dot"></div>
            </div>

            <h1 class="name">Hi, I'm <span>Adithya</span></h1>

            <div class="badge">B.Tech 3rd Year &nbsp;&middot;&nbsp; Vimal Jyothi Engineering College</div>

            <div class="divider"></div>

            <p class="bio">
                Passionate about <strong>problem solving</strong> and <strong>logical thinking</strong>.
                I love reading, playing instruments, and diving into new challenges every day to grow and build high-quality solutions.
            </p>

            <div class="stats">
                <div class="stat">
                    <div class="stat-num">3rd</div>
                    <div class="stat-label">Year</div>
                </div>
                <div class="stat">
                    <div class="stat-num">CSE</div>
                    <div class="stat-label">Branch</div>
                </div>
                <div class="stat">
                    <div class="stat-num">&#8734;</div>
                    <div class="stat-label">Curiosity</div>
                </div>
            </div>

            <p class="connect-label">Connect &amp; Explore</p>

            <div class="btn-group">
                <button class="btn btn-outline" onclick="window.open('https://linkedin.com','_blank')">LinkedIn</button>
                <button class="btn btn-outline" onclick="window.open('https://github.com','_blank')">GitHub</button>
                <button class="btn btn-primary" onclick="window.location.href='age.html'">Projects</button>
            </div>

        </div>
    </div>

</body>
</html>
